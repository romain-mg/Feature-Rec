name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Selftests
        run: pnpm selftest

      - name: Build service image
        run: docker build --tag feature-rec-service:ci .

      - name: Smoke test service image
        run: |
          docker run --detach --name feature-rec-service-ci --network host \
            --env DATABASE_URL=postgres://postgres:postgres@localhost:5432/postgres \
            --env FEATURE_REC_RUNNER_TOKEN=ci-smoke-test \
            feature-rec-service:ci

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/health; then
              exit 0
            fi
            sleep 1
          done

          exit 1

      - name: Print service logs on failure
        if: failure()
        run: docker logs feature-rec-service-ci || true

      - name: Clean up service image
        if: always()
        run: |
          docker stop --timeout 10 feature-rec-service-ci || true
          docker rm feature-rec-service-ci || true
